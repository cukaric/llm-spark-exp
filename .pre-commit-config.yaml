repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-ast
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # Run through the uv-managed env so intra-package imports and deps resolve.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (synthetic_faces, scoped)
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
      - id: bandit
        name: bandit (synthetic_faces)
        entry: uv run bandit -c pyproject.toml -r src/llm_spark_exp/synthetic_faces
        language: system
        types: [python]
        pass_filenames: false
